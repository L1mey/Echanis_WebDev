<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HTML Restaurant</title>
    <style>
        body {
            font-family: Times New Roman, serif;
        }
        .container {
            width: 400px;
            border: 1px solid black;
            padding: 15px;
        }
        h1 {
            font-size: 28px;
        }
        label {
            display: block;
            margin-top: 10px;
        }
        input {
            width: 100%;
            padding: 5px;
        }
        button {
            margin-top: 15px;
            padding: 5px 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>HTML Restaurant</h1>

    <form>
        <label>Name:</label>
        <input type="text">

        <label>Email:</label>
        <input type="email">

        <label>Phone No.:</label>
        <input type="tel">

        <label>Date:</label>
        <input type="date">

        <label>How many persons will be with you?</label>
        <input type="number">

        <label>Notes:</label>
        <input type="text">

        <label>Entry:</label>
        <input type="text">

        <button type="submit">Submit</button>
    </form>
</div>

</body>
</html>
