<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Inventory Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<header>
  <h1>Inventory</h1>
  <span>MANAGER v1.0</span>
</header>

<div class="form-card">
  <h2>Add New Product</h2>
  <form id="product-form">
    <div class="field">
      <label for="inp-name">Product Name</label>
      <input id="inp-name" type="text" required />
    </div>
    <div class="field">
      <label for="inp-price">Price ($)</label>
      <input id="inp-price" type="text" inputmode="decimal" min="0" step="0.01" required />
    </div>
    <div class="field">
      <label for="inp-stock">Stock Quantity</label>
      <input id="inp-stock" type="text" inputmode="numeric" min="0" required />
    </div>
    <button type="submit">+ Add Item</button>
  </form>
</div>

<div class="table-card">
  <div class="table-header">
    <h2>Product Inventory</h2>
    <span id="item-count">0 items</span>
  </div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Item Name</th>
          <th>Price</th>
          <th>Stock</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="table-body"></tbody>
    </table>
  </div>
</div>

<div id="toast"></div>

<script src="app.js"></script>
</body>
</html>
