<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>Tic Tac Toe</h2>
    <div id="status">Player X's Turn</div>

    <div class="board">
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
    </div>

     <div id="popup" class="popup hidden">
        <div class="popup-content">
            <p id="popupMessage"></p>
            <button id="closePopup">Reset Game</button>
        </div>
    </div>
    
    <button id="resetBtn">Reset Game</button>
</div>

<script src="Lab5.js"></script>
</body>
</html>
